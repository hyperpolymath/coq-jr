# SPDX-License-Identifier: MPL-2.0
# RSR-compliant CodeQL workflow with SHA-pinned actions

name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '42 20 * * 0'


permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Uncomment languages used in your project
          # - language: rust
          #   build-mode: manual
          # - language: go
          #   build-mode: autobuild
          # - language: java-kotlin
          #   build-mode: autobuild
          - language: actions
            build-mode: none
          # - language: python
          #   build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build (manual mode)
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          # Manual build commands - uncomment the appropriate line for your language
          # Rust: cargo build --release
          # Elixir: mix compile
          # Go: go build ./...
          # Java: ./gradlew build || mvn compile
          echo "Configure your build command above for manual build mode languages"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
